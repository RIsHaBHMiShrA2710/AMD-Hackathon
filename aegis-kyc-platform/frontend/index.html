    <script>
      // Ensure the page is always loaded with a trailing slash if we are behind a proxy
      // This is critical so that relative assets and API URLs resolve correctly.
      if (window.location.pathname.includes('/proxy/8001') && !window.location.pathname.endsWith('/')) {
        window.location.pathname = window.location.pathname + '/';
      }
    </script>
